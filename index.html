<!doctype html>
<html lang="en">
  <head>
    <!-- =========================
         BASIC META
    ========================== -->
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- =========================
         SEO
    ========================== -->
    <title>Velocity Transit - Global Shipment Tracking</title>

    <meta
      name="description"
      content="Track shipments globally with real-time delivery updates, logistics management, and courier tracking from Velocity Transit."
    />

    <meta
      name="keywords"
      content="shipment tracking, logistics, courier service, cargo delivery, package tracking, Velocity Transit"
    />

    <meta name="author" content="Velocity Transit" />

    <!-- =========================
         GOOGLE INDEXING
    ========================== -->
    <meta name="robots" content="index, follow" />

    <!-- =========================
         OPEN GRAPH (SOCIAL MEDIA)
    ========================== -->
    <meta
      property="og:title"
      content="Velocity Transit - Global Shipment Tracking"
    />

    <meta
      property="og:description"
      content="Track shipments globally with real-time delivery updates and logistics management."
    />

    <meta property="og:type" content="website" />

    <meta property="og:url" content="https://velocitytransit.xyz" />

    <meta
      property="og:image"
      content="https://velocitytransit.xyz/screen.png"
    />

    <!-- =========================
         TWITTER / X
    ========================== -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="Velocity Transit - Global Shipment Tracking"
    />

    <meta
      name="twitter:description"
      content="Track shipments globally with real-time logistics and courier tracking."
    />

    <meta
      name="twitter:image"
      content="https://velocitytransit.xyz/screen.png"
    />

    <!-- =========================
         FAVICON
         IMPORTANT:
         Move screen.png into /public
    ========================== -->
    <link rel="icon" type="image/png" href="/screen.png" />

    <!-- =========================
         GOOGLE FONTS
    ========================== -->
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- =========================
         MATERIAL ICONS
    ========================== -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
